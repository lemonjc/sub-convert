port: 7890
socks-port: 7891
mixed-port: 7892
allow-lan: false
mode: rule
log-level: info
ipv6: true

dns:
  enable: true
  listen: 0.0.0.0:5350
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - https://cloudflare-dns.com/dns-query#🌏️Main Proxy

proxies: []

proxy-groups:
  - name: "🌏️Main Proxy"
    type: select
    proxies:
      - DIRECT
      - REJECT

  - name: "🇨🇳China Services"
    type: select
    proxies:
      - DIRECT
      - "🌏️Main Proxy"
      - REJECT

  - name: "⚖Load Balance"
    type: load-balance
    proxies: []
    url: "https://cp.cloudflare.com"
    interval: 180
    lazy: true
    strategy: consistent-hashing

  - name: "♾️Auto Select"
    type: url-test
    proxies: []
    url: "https://cp.cloudflare.com"
    interval: 180
    lazy: false

rules:
  - "MATCH,🌏️Main Proxy"

